name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      custom_version:
        description: 'Custom version (overrides version_type if set)'
        required: false
        type: string

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current version
        id: current
        run: |
          CURRENT_VERSION=$(grep -oP "\\\$this->version\s*=\s*'\K[^']+" core/modules/modClientPayFourn.class.php)
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: new
        run: |
          CURRENT="${{ steps.current.outputs.version }}"

          if [ -n "${{ github.event.inputs.custom_version }}" ]; then
            NEW_VERSION="${{ github.event.inputs.custom_version }}"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

            case "${{ github.event.inputs.version_type }}" in
              major)
                NEW_VERSION="$((MAJOR + 1)).0"
                ;;
              minor)
                NEW_VERSION="${MAJOR}.$((MINOR + 1))"
                ;;
              patch)
                if [ -z "$PATCH" ]; then
                  NEW_VERSION="${MAJOR}.${MINOR}.1"
                else
                  NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
                fi
                ;;
            esac
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Check if version already up to date
        id: check
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          NEW="${{ steps.new.outputs.version }}"

          if [ "$CURRENT" = "$NEW" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version is already up to date ($CURRENT)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version in module descriptor
        if: steps.check.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          sed -i "s/\$this->version = '[^']*'/\$this->version = '$NEW_VERSION'/" core/modules/modClientPayFourn.class.php

          # Verify the change
          grep "\$this->version" core/modules/modClientPayFourn.class.php

      - name: Create Pull Request
        if: steps.check.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ steps.new.outputs.version }}"
          title: "chore: bump version to ${{ steps.new.outputs.version }}"
          body: |
            ## Version Bump

            This PR bumps the module version from `${{ steps.current.outputs.version }}` to `${{ steps.new.outputs.version }}`.

            **Bump type:** ${{ github.event.inputs.version_type }}

            After merging, create a new release with tag `v${{ steps.new.outputs.version }}` to trigger the build workflow.
          branch: version-bump-${{ steps.new.outputs.version }}
          base: main
          delete-branch: true

      - name: Skip notification
        if: steps.check.outputs.skip == 'true'
        run: |
          echo "::notice::Version is already up to date. No PR created."
